[tool.ruff]
target-version = "py39"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "DJ",  # flake8-django
]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint.per-file-ignores]
"hlimp_site/settings.py" = ["E501"]

