{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}🪩 How Long Is My Playlist?{% endblock %}</title>
    <link rel="icon" href="{% static 'playlists/icons/crystal-ball-favicon.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'playlists/colors.css' %}">
    <link rel="stylesheet" href="{% static 'playlists/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="logo" href="{% url 'calculator' %}"><span class="logo-icon">🔮</span> HLIMP</a>

            <div class="nav-actions">
                <a class="nav-link" href="{% url 'calculator' %}">Manual Calculator</a>
                {% if spotify_connected %}
                    <a class="button button-secondary" href="{% url 'spotify_logout' %}">Logout</a>
                {% else %}
                    <a class="button button-secondary" href="{% url 'spotify_login' %}">Login with Spotify</a>
                {% endif %}
            </div>

            <button class="hamburger" id="hamburger" aria-label="Open menu">
                <img src="{% static 'playlists/icons/menu.png' %}" alt="Menu">
            </button>
        </nav>
    </header>

    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <button class="menu-close" id="menuClose" aria-label="Close menu">
            <img src="{% static 'playlists/icons/close.png' %}" alt="Close">
        </button>
        <div class="menu-cta-wrapper">
            {% if spotify_connected %}
                <a class="button menu-cta" href="{% url 'spotify_logout' %}">Logout</a>
            {% else %}
                <a class="button menu-cta" href="{% url 'spotify_login' %}">Login with Spotify</a>
            {% endif %}
        </div>
    </div>

    <main class="page">
        {% block content %}
        {% endblock %}
    </main>
    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        function openMenu() {
            mobileMenu.classList.add('open');
            menuOverlay.classList.add('open');
        }

        function closeMenu() {
            mobileMenu.classList.remove('open');
            menuOverlay.classList.remove('open');
        }

        hamburger.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);
    </script>
</body>
</html>
